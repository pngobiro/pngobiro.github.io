<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Offline page for MCH Notes">
    <title>Offline | MCH Notes</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .offline-container {
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
        }

        .offline-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .offline-title {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .offline-message {
            color: var(--text-color);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .retry-button {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s ease;
        }

        .retry-button:hover {
            background-color: var(--accent-hover-color);
        }

        .cached-content {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
        }

        .cached-list {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: left;
            max-width: 400px;
            margin: 1rem auto;
        }

        .cached-item {
            padding: 0.5rem 0;
        }

        .cached-link {
            color: var(--accent-color);
            text-decoration: none;
        }

        .cached-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="offline-container">
            <div class="offline-icon">📡</div>
            <h1 class="offline-title">You're Offline</h1>
            <p class="offline-message">
                It seems you've lost your internet connection. Don't worry - any previously viewed pages are still available offline.
            </p>
            <button class="retry-button" onclick="window.location.reload()">
                Try Again
            </button>

            <div class="cached-content">
                <h2>Available Offline:</h2>
                <ul class="cached-list">
                    <li class="cached-item">
                        <a href="index.html" class="cached-link">Table of Contents</a>
                    </li>
                    <li class="cached-item">
                        <a href="topics/unit-1.html" class="cached-link">Unit 1: Introduction</a>
                    </li>
                    <li class="cached-item">
                        <a href="topics/unit-2.html" class="cached-link">Unit 2: Pregnancy Care</a>
                    </li>
                    <li class="cached-item">
                        <a href="topics/unit-3.html" class="cached-link">Unit 3: Growth & Development</a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
