<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Error page for MCH Notes">
    <title>Error | MCH Notes</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192x192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/main.css">
    <style>
        .error-container {
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .error-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: var(--accent-color);
        }

        .error-title {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .error-message {
            color: var(--text-color);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .error-code {
            font-family: monospace;
            background-color: var(--background-color);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            color: var(--accent-color);
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .action-button {
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .primary-button {
            background-color: var(--accent-color);
            color: white;
        }

        .primary-button:hover {
            background-color: var(--accent-hover-color);
        }

        .secondary-button {
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
        }

        .secondary-button:hover {
            background-color: var(--background-color);
        }

        .helpful-links {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
        }

        .links-title {
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .links-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
        }

        .links-list a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .links-list a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-container">
            <div class="error-icon">😕</div>
            <h1 class="error-title">Oops! Something went wrong</h1>
            <p class="error-message">
                The page you're looking for can't be found or an error occurred.
                <br>
                Error Code: <span class="error-code" id="errorCode">404</span>
            </p>

            <div class="action-buttons">
                <a href="/" class="action-button primary-button">Go Home</a>
                <a href="javascript:history.back()" class="action-button secondary-button">Go Back</a>
            </div>

            <div class="helpful-links">
                <h2 class="links-title">You might find these helpful:</h2>
                <ul class="links-list">
                    <li><a href="/topics/unit-1.html">Unit 1: Introduction</a></li>
                    <li><a href="/topics/unit-2.html">Unit 2: Pregnancy Care</a></li>
                    <li><a href="/topics/unit-3.html">Unit 3: Growth & Development</a></li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // Get error code from URL parameter
        const params = new URLSearchParams(window.location.search);
        const errorCode = params.get('code') || '404';
        document.getElementById('errorCode').textContent = errorCode;

        // Update title based on error code
        const errorTitles = {
            '404': 'Page Not Found',
            '500': 'Server Error',
            '403': 'Access Denied',
            '503': 'Service Unavailable'
        };
        if (errorTitles[errorCode]) {
            document.querySelector('.error-title').textContent = errorTitles[errorCode];
        }
    </script>
</body>
</html>
