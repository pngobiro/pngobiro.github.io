<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Installation Check | MCH Notes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .check-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: var(--card-background-color);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .check-title {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 2rem;
        }

        .check-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .check-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .check-item:last-child {
            border-bottom: none;
        }

        .check-icon {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        .check-icon.success {
            color: #2ecc71;
        }

        .check-icon.error {
            color: #e74c3c;
        }

        .check-text {
            flex-grow: 1;
        }

        .install-button {
            display: none;
            margin-top: 2rem;
            padding: 1rem 2rem;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 1.1em;
        }

        .install-button:hover {
            background-color: var(--accent-hover-color);
        }

        .install-button.visible {
            display: block;
        }

        @media (max-width: 768px) {
            .check-container {
                margin: 1rem;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="check-container">
            <h1 class="check-title">PWA Installation Check</h1>
            <ul class="check-list" id="checkList">
                <li class="check-item">
                    <span class="check-icon" id="manifestCheck">⏳</span>
                    <span class="check-text">Web App Manifest</span>
                </li>
                <li class="check-item">
                    <span class="check-icon" id="serviceWorkerCheck">⏳</span>
                    <span class="check-text">Service Worker Support</span>
                </li>
                <li class="check-item">
                    <span class="check-icon" id="installabilityCheck">⏳</span>
                    <span class="check-text">Can be installed</span>
                </li>
            </ul>
            <button id="installButton" class="install-button">Install MCH Notes</button>
        </div>
    </div>

    <script>
        let deferredPrompt;
        const installButton = document.getElementById('installButton');
        
        // Check manifest
        fetch('manifest.json')
            .then(response => {
                document.getElementById('manifestCheck').innerHTML = 
                    response.ok ? '✅' : '❌';
                document.getElementById('manifestCheck').className = 
                    response.ok ? 'check-icon success' : 'check-icon error';
            })
            .catch(() => {
                document.getElementById('manifestCheck').innerHTML = '❌';
                document.getElementById('manifestCheck').className = 'check-icon error';
            });

        // Check service worker
        if ('serviceWorker' in navigator) {
            document.getElementById('serviceWorkerCheck').innerHTML = '✅';
            document.getElementById('serviceWorkerCheck').className = 'check-icon success';
        } else {
            document.getElementById('serviceWorkerCheck').innerHTML = '❌';
            document.getElementById('serviceWorkerCheck').className = 'check-icon error';
        }

        // Check installability
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installabilityCheck').innerHTML = '✅';
            document.getElementById('installabilityCheck').className = 'check-icon success';
            installButton.classList.add('visible');
        });

        installButton.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    deferredPrompt = null;
                    installButton.classList.remove('visible');
                }
            }
        });

        // Check if already installed
        if (window.matchMedia('(display-mode: standalone)').matches) {
            document.getElementById('installabilityCheck').innerHTML = '✅';
            document.getElementById('installabilityCheck').className = 'check-icon success';
            document.getElementById('installButton').style.display = 'none';
        }
    </script>
</body>
</html>
